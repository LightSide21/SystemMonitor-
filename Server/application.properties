spring.application.name=SystemMonitor
server.port=${SERVER_PORT:8045}

# PostgreSQL Configuration (Users, Computers, Specs)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/system_monitor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:monitor}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# InfluxDB Configuration (Metrics)
influxdb.url=${INFLUXDB_URL:http://localhost:8086}
influxdb.token=${INFLUXDB_TOKEN:change_me}
influxdb.org=${INFLUXDB_ORG:system-monitor}
influxdb.bucket=${INFLUXDB_BUCKET:metrics}
management.metrics.export.influx.api-version=v2

# JWT Configuration (For Mobile App Auth)
app.jwtSecret=${JWT_SECRET:change_me}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}